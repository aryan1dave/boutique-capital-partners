<!-- @dsCard group="Colors" viewport="700x140" name="Text on dark" subtitle="White-alpha hierarchy on navy" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: var(--bcp-navy); }
  .wrap { padding: 18px 22px; display: grid; gap: 9px; }
  .row { display: flex; align-items: baseline; gap: 14px; font-size: 15px; }
  .tok { font-size: 11px; color: rgba(255,255,255,0.35); min-width: 230px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="tok">--text-on-dark · #FFF</span><span style="color: #fff; font-weight: 600;">Titles &amp; names — solid white</span></div>
    <div class="row"><span class="tok">--text-on-dark-secondary · 85%</span><span style="color: rgba(255,255,255,0.85);">Body copy and list items</span></div>
    <div class="row"><span class="tok">--text-on-dark-tertiary · 50%</span><span style="color: rgba(255,255,255,0.5); text-transform: uppercase; font-size: 13px; letter-spacing: 1px; font-weight: 600;">Eyebrow labels</span></div>
    <div class="row"><span class="tok">menu numbers · 40%</span><span style="color: rgba(255,255,255,0.4); font-size: 11px; font-weight: 600; letter-spacing: 0.5px;">01&nbsp;&nbsp;02&nbsp;&nbsp;03</span></div>
  </div>
</body>
</html>
