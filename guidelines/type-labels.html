<!-- @dsCard group="Type" viewport="700x140" name="Eyebrows & labels" subtitle="Tiny uppercase letterspaced labels" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); }
  .half { display: grid; grid-template-columns: 1fr 1fr; }
  .pad { padding: 18px 22px; display: grid; gap: 12px; align-content: start; }
</style>
</head>
<body>
  <div class="half">
    <div class="pad" style="background: #fff;">
      <div style="font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--bcp-coral);">Viewpoint</div>
      <div style="font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(0,0,92,0.5);">Phone</div>
      <div style="display: inline-flex;"><span style="font-size: 11px; font-weight: 700; letter-spacing: 0.3px; padding: 5px 12px; background: var(--bcp-cream); border-radius: 20px; color: var(--bcp-navy);">Market Commentary</span></div>
    </div>
    <div class="pad" style="background: var(--bcp-navy);">
      <div style="font-size: 12px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--bcp-coral);">Service 01</div>
      <div style="font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: rgba(255,255,255,0.5);">Key Features</div>
      <div style="font-size: 11px; font-weight: 600; letter-spacing: 0.5px; color: rgba(255,255,255,0.4);">01 &nbsp; 02 &nbsp; 03 &nbsp; 04</div>
    </div>
  </div>
</body>
</html>
