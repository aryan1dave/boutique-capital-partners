<!-- @dsCard group="Spacing" viewport="700x170" name="Corner radii" subtitle="6 · 8 · 12 · 16 · 20 px" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: var(--bcp-cream); }
  .row { display: flex; gap: 14px; padding: 16px; align-items: flex-end; }
  .box { background: #fff; border: 1px solid var(--border-card); box-shadow: var(--shadow-card); width: 116px; height: 92px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; }
  .v { font-size: 15px; font-weight: 600; color: var(--bcp-navy); }
  .u { font-size: 10px; color: var(--bcp-sand-400); text-align: center; }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="border-radius: 6px;"><span class="v">6px</span><span class="u">small CTAs</span></div>
    <div class="box" style="border-radius: 8px;"><span class="v">8px</span><span class="u">photo cards</span></div>
    <div class="box" style="border-radius: 12px;"><span class="v">12px</span><span class="u">panels, buttons</span></div>
    <div class="box" style="border-radius: 16px;"><span class="v">16px</span><span class="u">insight cards, modals</span></div>
    <div class="box" style="border-radius: 20px;"><span class="v">20px</span><span class="u">callouts, CTA panels</span></div>
  </div>
</body>
</html>
