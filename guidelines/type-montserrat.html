<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: #fff; color: var(--bcp-navy); }
  .wrap { padding: 18px 24px; }
  .big { font-size: 34px; line-height: 1.2; margin: 0 0 12px 0; }
  .weights { display: flex; gap: 22px; font-size: 17px; align-items: baseline; flex-wrap: wrap; }
  .w span { display: block; font-size: 10px; color: var(--bcp-sand-400); font-weight: 400; margin-top: 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <p class="big"><em style="font-weight: 400;">Outsourced</em> distribution for <strong style="font-weight: 700; font-style: normal;">outstanding</strong> investment strategies</p>
    <div class="weights">
      <div class="w" style="font-weight: 400;">Regular<span>400 · hero, body</span></div>
      <div class="w" style="font-weight: 500;">Medium<span>500 · UI, leads</span></div>
      <div class="w" style="font-weight: 600;">Semibold<span>600 · headings</span></div>
      <div class="w" style="font-weight: 700;">Bold<span>700 · emphasis</span></div>
      <div class="w" style="font-weight: 400; font-style: italic;">Italic<span>inline emphasis</span></div>
    </div>
  </div>
</body>
</html>
