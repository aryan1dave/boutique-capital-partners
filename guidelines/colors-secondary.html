<!-- @dsCard group="Colors" viewport="700x150" name="Secondary & interactive" subtitle="Teal, mid blue, coral hover shades" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: #fff; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 14px; }
  .sw { height: 86px; border-radius: var(--radius-md); padding: 10px 12px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; color: #fff; }
  .name { font-size: 12px; font-weight: 600; }
  .hex { font-size: 10px; opacity: 0.8; }
</style>
</head>
<body>
  <div class="grid">
    <div class="sw" style="background: var(--bcp-teal);">
      <div class="name">Teal</div><div class="hex">#257A99 · swirl, CSR</div>
    </div>
    <div class="sw" style="background: var(--bcp-blue-mid);">
      <div class="name">Mid blue</div><div class="hex">#0F367A · rare</div>
    </div>
    <div class="sw" style="background: var(--bcp-coral-hover-dark);">
      <div class="name">Coral hover ▼</div><div class="hex">#C54D4D · buttons</div>
    </div>
    <div class="sw" style="background: var(--bcp-coral-hover-light);">
      <div class="name">Coral hover ▲</div><div class="hex">#F07070 · links</div>
    </div>
    <div class="sw" style="background: linear-gradient(90deg, #DE5C5C 0%, #E88A8A 100%);">
      <div class="name">Accent bar</div><div class="hex">the only gradient</div>
    </div>
  </div>
</body>
</html>
