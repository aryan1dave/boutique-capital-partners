<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); }
  .grid { display: grid; grid-template-columns: 1fr 1fr 130px; }
  .cell { display: flex; align-items: center; justify-content: center; padding: 24px; height: 152px; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="grid">
    <div class="cell" style="background: #fff;">
      <img src="../assets/logos/bcp-logo.webp" alt="BCP logo" style="width: 230px;">
    </div>
    <div class="cell" style="background: var(--bcp-navy);">
      <img src="../assets/logos/bcp-logo-cream.png" alt="BCP logo cream" style="width: 230px;">
    </div>
    <div class="cell" style="background: var(--bcp-cream);">
      <img src="../assets/logos/bcp-mark-180.png" alt="BCP swirl mark" style="width: 84px;">
    </div>
  </div>
</body>
</html>
