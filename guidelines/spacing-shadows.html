<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Navy-tinted card shadows, coral glow, float" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: var(--bcp-cream); }
  .row { display: flex; gap: 22px; padding: 24px; }
  .box { background: #fff; border-radius: 12px; width: 142px; height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; }
  .v { font-size: 12px; font-weight: 600; color: var(--bcp-navy); }
  .u { font-size: 10px; color: var(--bcp-sand-400); text-align: center; padding: 0 10px; }
</style>
</head>
<body>
  <div class="row">
    <div class="box" style="box-shadow: var(--shadow-card);"><span class="v">card</span><span class="u">0 4 20 navy/8% — resting</span></div>
    <div class="box" style="box-shadow: var(--shadow-card-hover);"><span class="v">card-hover</span><span class="u">0 16 40 navy/15% + lift</span></div>
    <div class="box" style="box-shadow: var(--shadow-float);"><span class="v">float</span><span class="u">0 8 32 black/12% — on photos</span></div>
    <div class="box" style="box-shadow: var(--shadow-coral); background: var(--bcp-coral);"><span class="v" style="color: #fff;">coral</span><span class="u" style="color: rgba(255,255,255,0.85);">0 4 15 coral/30% — callouts</span></div>
  </div>
</body>
</html>
