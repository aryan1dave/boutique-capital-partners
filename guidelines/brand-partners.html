<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-brand); background: var(--bcp-navy); }
  .row { display: flex; gap: 16px; padding: 20px; align-items: center; }
  .cell { border-radius: 8px; height: 110px; width: 170px; display: flex; align-items: center; justify-content: center; padding: 14px; box-sizing: border-box; }
</style>
</head>
<body>
  <div class="row">
    <div class="cell" style="background: #fff;"><img src="../assets/logos/river-road-logo.svg" alt="River Road" style="max-width: 100%; max-height: 100%;"></div>
    <div class="cell" style="background: #c0c0c0; border-radius: 18px;"><img src="../assets/logos/cornerstone-logo.png" alt="Cornerstone" style="max-width: 100%; max-height: 100%;"></div>
    <div class="cell"><img src="../assets/logos/scottish-seabird-centre-white.png" alt="Scottish Seabird Centre" style="max-width: 100%; max-height: 100%;"></div>
  </div>
</body>
</html>
